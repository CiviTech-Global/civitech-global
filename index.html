    <meta name="description" content="CiviTech Global — Teams, Roles & Career Roadmaps. Rayan Tamaddon Jahan Gostar official website." />
    <title>CiviTech Global — Teams, Roles & Career Roadmaps</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script>
      (function () {
        const base = '/civitech-global/'
        const params = new URLSearchParams(window.location.search)
        const redirect = params.get('redirect')
        if (redirect) {
          params.delete('redirect')
          const search = params.toString()
          const target = base + redirect.replace(/^\//, '') + (search ? '?' + search : '') + window.location.hash
          window.history.replaceState(null, '', target)
        }
      })()
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
